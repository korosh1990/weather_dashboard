<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #f8fafc);
            color: #111827;
        }
        h1 {
            text-align: center;
            margin: 24px 0 8px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .temp {
            font-size: 2rem;
            font-weight: bold;
            margin: 8px 0;
        }
        @media (max-width: 700px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>Weather in my favorite Cities</h1>
    <div class="container">
        
            <section class="card">
                <h2>Hamburg, Germany</h2>
                <p class="temp">18.6°C</p>
                <p>Mainly clear</p>
                <p>Wind: 2.3 km/h</p>
            </section>
            
            <section class="card">
                <h2>Kyiv, Ukraine</h2>
                <p class="temp">23.5°C</p>
                <p>Mainly clear</p>
                <p>Wind: 6.7 km/h</p>
            </section>
            
            <section class="card">
                <h2>Los Angeles, USA</h2>
                <p class="temp">21.4°C</p>
                <p>Clear sky</p>
                <p>Wind: 6.8 km/h</p>
            </section>
            
            <section class="card">
                <h2>Semirom, Iran</h2>
                <p class="temp">27.0°C</p>
                <p>Clear sky</p>
                <p>Wind: 16.9 km/h</p>
            </section>
            
    </div>
</body>
</html>
